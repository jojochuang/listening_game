<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <script>
        document.documentElement.style.setProperty('--viewport-height', (window.visualViewport ? window.visualViewport.height : window.innerHeight) + 'px');
    </script>
    <title>聽音辨字遊戲</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html, body {
            height: 100%;
            height: 100vh;
            height: 100svh;
            height: var(--viewport-height, 100svh);
            min-height: 0;
            overflow: hidden;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft JhengHei', '微軟正黑體', Arial, sans-serif;
            background: #f0f4ff;
            padding: 8px 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            width: 100%;
            max-width: 1400px;
            height: 100%;
            min-height: 0;
            background: #ffffff;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.15);
            padding: 12px 16px;
            display: flex;
            flex-direction: column;
            flex: 1;
            max-height: 100%;
        }
        /* 手機直向時，取消外圈灰底與卡片陰影／圓角，讓遊戲佔滿整個畫面 */
        @media (max-width: 480px), (max-height: 700px) and (orientation: portrait) {
            body {
                background: #ffffff;
                padding: 0;
                align-items: stretch;
            }
            .container {
                max-width: none;
                border-radius: 0;
                box-shadow: none;
                padding: 8px 8px 0;
            }
        }
        header, .game-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 8px;
            flex-wrap: wrap;
            gap: 8px;
            flex-shrink: 0;
        }
        .game-header .back-link {
            flex-shrink: 0;
        }
        .game-header .title-banner {
            flex: 1;
            display: flex;
            justify-content: center;
            min-width: 0;
        }
        .game-header .header-right {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
        }
        .status-bar {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 0.9em;
            flex-wrap: wrap;
        }
        .title-banner-inner {
            background: linear-gradient(135deg, #ffb74d 0%, #ff9800 100%);
            color: white;
            font-size: 1.6em;
            font-weight: bold;
            padding: 10px 32px;
            border-radius: 24px;
            box-shadow: 0 4px 12px rgba(255,152,0,0.4);
            position: relative;
        }
        .title-banner-inner::before {
            content: '';
            position: absolute;
            top: -4px;
            left: 20%;
            right: 20%;
            height: 8px;
            background: linear-gradient(90deg, transparent, #64b5f6, transparent);
            border-radius: 4px;
        }
        .status-bar {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 0.9em;
        }
        .back-link {
            color: #1565c0;
            text-decoration: none;
            padding: 4px 10px;
            border-radius: 999px;
            background: #e3f2fd;
        }
        .back-link:hover {
            text-decoration: underline;
        }
        .status-pill {
            padding: 4px 10px;
            border-radius: 999px;
            background: #e3f2fd;
            color: #1565c0;
        }
        .mode-pill {
            padding: 4px 10px;
            border-radius: 999px;
            background: #ede7f6;
            color: #4527a0;
        }
        .mode-btn {
            border: none;
            cursor: pointer;
            font: inherit;
        }
        .mode-btn:hover {
            background: #d1c4e9;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-auto-rows: minmax(0, 1fr);
            gap: clamp(6px, 1.5vmin, 12px) clamp(8px, 2vmin, 16px);
            margin-top: clamp(4px, 1vmin, 8px);
            flex: 1;
            min-height: 0;
        }
        /* 小螢幕手機（如 iPhone SE）：標題列固定上緣、控制列固定底、可滑動、綠框有最小高度 */
        @media (max-width: 480px), (max-height: 700px) and (orientation: portrait) {
            body.game-page #gameView {
                display: flex !important;
                flex-direction: column;
                min-height: 0;
                overflow-y: auto;
                -webkit-overflow-scrolling: touch;
                flex: 1;
                padding-top: 40px;
                padding-bottom: 52px;
            }
            body.game-page #gameView .game-header {
                position: fixed;
                top: 0;
                left: 0;
                right: 0;
                z-index: 60;
                margin: 0;
                padding: 6px 10px;
                padding-top: max(6px, env(safe-area-inset-top));
                background: #f0f4ff;
                box-shadow: 0 1px 0 rgba(0,0,0,0.08);
            }
            body.game-page #gameView .game-header .back-link {
                padding: 4px 8px;
                font-size: 0.85em;
            }
            body.game-page #gameView .game-header .title-banner-inner {
                font-size: 1.1em;
                padding: 4px 16px;
            }
            body.game-page #gameView .game-header .header-right .status-pill {
                padding: 3px 6px;
                font-size: 0.8em;
            }
            body.game-page #gameView .game-controls-bottom {
                position: fixed;
                bottom: 0;
                left: 0;
                right: 0;
                z-index: 61;
                margin: 0;
                padding: 6px 10px;
                padding-bottom: max(6px, env(safe-area-inset-bottom));
                background: #fff;
                box-shadow: 0 -2px 12px rgba(0,0,0,0.1);
                display: flex;
                justify-content: space-between;
                align-items: center;
                gap: 6px;
            }
            body.game-page #gameView .game-controls-bottom .lesson-switcher {
                gap: 2px;
            }
            body.game-page #gameView .game-controls-bottom .mode-pill {
                padding: 4px 8px;
                font-size: 0.85em;
            }
            body.game-page #gameView .grid {
                flex: 1;
                min-height: 0;
                grid-auto-rows: minmax(112px, 1fr);
                margin-top: 2px;
            }
            body.game-page #gameView .card {
                min-height: 92px;
                padding: 3px 5px;
            }
            body.game-page #gameView .card-main {
                padding: 2px;
                flex: 1;
                min-height: 0;
            }
            body.game-page #gameView .card-main img {
                max-height: 100%;
                min-height: 50%;
            }
            body.game-page #gameView .card-zhuyin {
                font-size: clamp(34px, 12vmin, 72px);
                line-height: 1.05;
            }
            body.game-page #gameView .card-label,
            body.game-page #gameView .card-number {
                font-size: 0.95em;
                margin-top: 4px;
            }
            body.game-page #gameView .lesson-arrow {
                width: 28px;
                height: 28px;
                font-size: 1em;
            }
            body.game-page #gameView #lessonLabel {
                font-size: 0.9em;
            }
            body.game-page #gameView .btn {
                padding: 6px 14px;
                font-size: 0.9em;
                min-width: 80px;
            }
        }
        @media (max-width: 800px) {
            .grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
        @media (orientation: landscape) {
            body { padding: 4px 8px; }
            .container { padding: 6px 10px; max-height: 100%; }
            header { margin-bottom: 4px; flex-shrink: 0; }
            .title-banner-inner { font-size: 1.2em; padding: 4px 20px; }
            .grid { gap: 6px 10px; margin-top: 4px; flex: 1; min-height: 0; max-height: 96vh; grid-auto-rows: 1fr; }
            .card-wrap { min-height: 0; display: flex; flex-direction: column; align-items: center; }
            .card-wrap .card { flex: 1; min-height: 0; }
            .card-zhuyin { font-size: clamp(36px, 10vmin, 72px); line-height: 1.05; letter-spacing: -0.03em; }
            .card-label { font-size: 1.2em; margin-top: 2px; flex-shrink: 0; }
            .game-controls-bottom, .bottom-bar { margin-top: 4px; gap: 8px; flex-shrink: 0; }
            .btn { padding: 6px 14px; font-size: 0.9em; min-width: 90px; }
        }
        @media (orientation: landscape) and (max-height: 500px) {
            body { padding: 2px 6px; }
            .container { padding: 4px 8px; max-height: 100%; }
            .title-banner-inner { font-size: 1em; padding: 2px 16px; }
            .status-bar { font-size: 0.8em; }
            .grid { gap: 6px 10px; margin-top: 2px; flex: 1; min-height: 0; max-height: 84vh; grid-auto-rows: 1fr; }
            .card-wrap { min-height: 0; }
            .card-zhuyin { font-size: clamp(28px, 8vmin, 56px); line-height: 1.05; letter-spacing: -0.03em; }
            .card-label { font-size: 1em; margin-top: 2px; flex-shrink: 0; }
            .game-controls-bottom, .bottom-bar { margin-top: 2px; gap: 6px; flex-shrink: 0; }
            .btn { padding: 4px 10px; font-size: 0.85em; min-width: 70px; }
        }
        .card-wrap {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .card {
            position: relative;
            border-radius: clamp(12px, 3vmin, 20px);
            border: 3px solid #a5d6a7;
            padding: clamp(6px, 1.5vmin, 12px);
            background: #fafafa;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 0;
            min-width: 0;
            height: 100%;
            width: 100%;
            transition: transform 0.15s, box-shadow 0.15s, border-color 0.15s, background-color 0.15s;
        }
        .card-number {
            position: absolute;
            top: 4px;
            left: 6px;
            font-size: 1.8em;
            font-weight: bold;
            opacity: 0.45;
            color: #333;
            pointer-events: none;
        }
        body.hide-card-numbers .card-number { display: none; }
        body.night-mode .card-number { color: #fff; opacity: 0.4; }
        .card:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 14px rgba(76,175,80,0.3);
        }
        .card.correct {
            border-color: #43a047;
            background: #e8f5e9;
        }
        .card.wrong {
            border-color: #e53935;
            background: #ffebee;
            position: relative;
        }
        .card.wrong::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 60%;
            height: 8px;
            background: #c62828;
            transform-origin: center;
            transform: translate(-50%, -50%) rotate(45deg);
            border-radius: 4px;
            box-shadow: 0 0 8px rgba(198,40,40,0.5);
        }
        .card.wrong::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 60%;
            height: 8px;
            background: #c62828;
            transform-origin: center;
            transform: translate(-50%, -50%) rotate(-45deg);
            border-radius: 4px;
            box-shadow: 0 0 8px rgba(198,40,40,0.5);
            z-index: 1;
        }
        .card.disabled {
            cursor: default;
            opacity: 0.7;
        }
        .card-main {
            flex: 1;
            min-height: 0;
            min-width: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 4px;
            overflow: hidden;
        }
        .card-main img {
            width: 100%;
            height: auto;
            max-height: 100%;
            object-fit: contain;
            object-position: center;
            border-radius: 8px;
            user-select: none;
            -webkit-user-select: none;
            -webkit-touch-callout: none;
            pointer-events: none;
        }
        .card-zhuyin {
            font-family: 'BpmfZhuyin', 'BpmfZihiOnly', 'BpmfZihiKaiStd', 'Microsoft JhengHei', '微軟正黑體', sans-serif;
            font-size: clamp(48px, 14vmin, 144px);
            text-align: center;
            line-height: 1.15;
            letter-spacing: -0.02em;
        }
        .card-label {
            margin-top: 8px;
            font-size: 1.8em;
            color: #444;
            text-align: center;
        }
        .card-number {
            position: absolute;
            top: 4px;
            left: 6px;
            font-size: 1.8em;
            font-weight: bold;
            opacity: 0.45;
            color: #333;
            pointer-events: none;
        }
        body.hide-card-numbers .card-number { display: none; }
        body.night-mode .card-number { color: #fff; opacity: 0.4; }
        .game-controls-bottom,
        .bottom-bar {
            margin-top: 10px;
            flex-shrink: 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }
        .lesson-switcher {
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .lesson-arrow {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: 2px solid #42a5f5;
            background: #e3f2fd;
            color: #1565c0;
            font-size: 1.2em;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
            line-height: 1;
        }
        .lesson-arrow:hover {
            background: #42a5f5;
            color: white;
        }
        .lesson-arrow:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }
        #lessonLabel {
            font-size: 1em;
            color: #333;
            min-width: 4em;
            text-align: center;
        }
        .btn {
            padding: 10px 20px;
            border-radius: 999px;
            border: none;
            font-size: 1em;
            cursor: pointer;
            min-width: 120px;
            transition: transform 0.1s, box-shadow 0.1s, background-color 0.1s;
        }
        .btn-primary {
            background: linear-gradient(135deg, #42a5f5, #1e88e5);
            color: white;
            box-shadow: 0 4px 10px rgba(33,150,243,0.35);
        }
        .btn-primary:hover {
            background: linear-gradient(135deg, #1e88e5, #1565c0);
        }
        .btn-secondary {
            background: #eeeeee;
            color: #333;
        }
        .btn:active {
            transform: translateY(1px);
            box-shadow: none;
        }
        .message {
            margin-top: 6px;
            min-height: 1.3em;
            font-size: 0.95em;
            text-align: center;
            color: #555;
        }
        .message.success {
            color: #2e7d32;
        }
        .message.error {
            color: #c62828;
        }
        .message.info {
            color: #1565c0;
        }
        .hidden {
            display: none;
        }
        .night-toggle {
            padding: 6px 10px;
            border-radius: 999px;
            border: 1px solid #888;
            background: rgba(255,255,255,0.9);
            color: #333;
            font-size: 0.85em;
            cursor: pointer;
        }
        .night-toggle:hover { background: #eee; }
        body.night-mode .night-toggle {
            background: rgba(40,40,40,0.9);
            color: #ddd;
            border-color: #666;
        }
        body.night-mode .night-toggle:hover { background: #333; }
        /* 夜覽模式：黑底白字，減少藍光 */
        body.night-mode { background: #0d0d0d !important; }
        body.night-mode .container { background: #0d0d0d !important; }
        body.night-mode .game-header,
        body.night-mode .game-controls-bottom { background: #0d0d0d !important; }
        body.night-mode .game-header { box-shadow: 0 1px 0 rgba(255,255,255,0.1); }
        body.night-mode .game-controls-bottom { box-shadow: 0 -2px 12px rgba(255,255,255,0.1); }
        body.night-mode .back-link { color: #90caf9; background: #1a1a2e; }
        body.night-mode .status-pill { color: #90caf9; background: #1a1a2e; }
        body.night-mode .card { background: #1a1a1a; border-color: #2d5a2d; }
        body.night-mode .card.correct { background: #0d2b0d; border-color: #2d7a2d; }
        body.night-mode .card.wrong { background: #2b0d0d; border-color: #7a2d2d; }
        body.night-mode .card-main { background: transparent; }
        body.night-mode .card-zhuyin { color: #fff; }
        body.night-mode .card-label { color: #fff; }
        body.night-mode #lessonLabel { color: #ddd; }
        body.night-mode .lesson-arrow { background: #1a1a2e; color: #90caf9; border-color: #42a5f5; }
        body.night-mode .lesson-arrow:hover { background: #42a5f5; color: #fff; }
        body.night-mode .message { color: #aaa; }
        body.night-mode .message.info { color: #90caf9; }
        body.night-mode .mode-pill { background: #2d1a4e; color: #ce93d8; }
        body.night-mode .menu-view h2 { color: #eee; }
        body.night-mode .menu-row label { color: #bbb; }
        body.night-mode .menu-row select { background: #1a1a1a; color: #fff; border-color: #444; }
        body.night-mode .start-overlay span { background: #1a1a1a; color: #fff; }
        /* 可收合工具列：小螢幕顯示於左下，隱藏時只顯示 >，展開顯示 < 與夜覽／編號 */
        .tool-bar-outer {
            display: none;
            position: fixed;
            bottom: 0;
            left: 0;
            z-index: 65;
            padding-bottom: env(safe-area-inset-bottom);
            align-items: flex-end;
            gap: 0;
        }
        .tool-bar-outer .tool-bar-toggle {
            width: 32px;
            height: 32px;
            border-radius: 8px 8px 0 0;
            border: 1px solid #ccc;
            background: rgba(255,255,255,0.95);
            font-size: 1rem;
            cursor: pointer;
            line-height: 1;
        }
        .tool-bar-outer .tool-bar-panel {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 10px;
            border: 1px solid #ccc;
            border-left: none;
            border-radius: 8px 8px 0 0;
            background: rgba(255,255,255,0.95);
        }
        .tool-bar-outer.collapsed .tool-bar-panel { display: none; }
        .tool-bar-outer .night-toggle,
        .tool-bar-outer .tool-bar-number-btn {
            padding: 4px 10px;
            font-size: 0.85em;
            border-radius: 999px;
            border: 1px solid #888;
            background: #fff;
            color: #333;
            cursor: pointer;
        }
        .tool-bar-outer .tool-bar-number-btn { min-width: 4.5em; }
        body.night-mode .tool-bar-outer .tool-bar-toggle,
        body.night-mode .tool-bar-outer .tool-bar-panel {
            background: rgba(30,30,30,0.95);
            border-color: #555;
            color: #ddd;
        }
        body.night-mode .tool-bar-outer .night-toggle,
        body.night-mode .tool-bar-outer .tool-bar-number-btn {
            background: #2a2a2a;
            border-color: #666;
            color: #ddd;
        }
        @media (max-width: 480px), (max-height: 700px) and (orientation: portrait) {
            .tool-bar-outer { display: flex; bottom: 52px; }
            body.game-page .game-header .night-toggle { display: none; }
            body.menu-page .menu-view .night-toggle { display: none; }
        }
        /* 選單頁：只顯示選單，全畫面 */
        body.menu-page #gameView {
            display: none !important;
        }
        body.menu-page #menuView {
            display: flex !important;
            flex: 1;
            justify-content: center;
            align-items: center;
            align-self: center;
            width: 100%;
        }
        /* 遊戲頁：只顯示遊戲 */
        body.game-page #menuView {
            display: none !important;
        }
        body.game-page #gameView {
            display: flex !important;
            flex: 1;
            flex-direction: column;
            min-height: 0;
        }
        .menu-view {
            width: 100%;
            max-width: 480px;
            padding: 24px 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .menu-view h2 {
            text-align: center;
            color: #333;
            font-size: 1.4em;
            margin-bottom: 8px;
        }
        .menu-row {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .menu-row label {
            font-size: 0.95em;
            color: #555;
        }
        .menu-row select {
            padding: 10px 12px;
            font-size: 1em;
            border: 2px solid #a5d6a7;
            border-radius: 12px;
            background: #fff;
            color: #333;
        }
        .menu-view .btn {
            margin-top: 12px;
        }
        .start-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            cursor: pointer;
        }
        .start-overlay span {
            background: white;
            padding: 24px 48px;
            border-radius: 16px;
            font-size: 1.3em;
            color: #333;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
        }
        .success-banner {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 1001;
            background: rgba(236, 64, 122, 0.75);
            color: white;
            padding: 72px 320px;
            border-radius: 48px;
            font-size: 5.4em;
            font-weight: bold;
            box-shadow: 0 16px 64px rgba(0,0,0,0.3);
            display: none;
            align-items: center;
            justify-content: center;
            pointer-events: none;
            white-space: nowrap;
        }
        .success-banner.show {
            display: flex;
        }
        @font-face {
            font-family: 'BpmfZhuyin';
            src: url('BpmfSpecial/BpmfZihiOnly-R.ttf') format('truetype');
            font-display: swap;
        }
    </style>
</head>
<body>
    <div class="container">
        <div id="menuView" class="menu-view hidden">
            <h2>關卡選單</h2>
            <div id="menuError" class="message error" style="display:none; margin-bottom:8px;"></div>
            <div class="menu-row">
                <label>課本</label>
                <select id="menuBook"></select>
            </div>
            <div class="menu-row">
                <label>第幾課</label>
                <select id="menuLesson"></select>
            </div>

    <script>
        (function initNightMode() {
            const key = 'listening_game_night';
            const btns = [document.getElementById('nightToggle'), document.getElementById('nightToggleMenu'), document.getElementById('nightToggleTool')].filter(Boolean);
            const active = localStorage.getItem(key) === '1';
            if (active) document.body.classList.add('night-mode');
            function updateLabels() {
                const on = document.body.classList.contains('night-mode');
                btns.forEach(b => { if (b) b.textContent = on ? '日間' : '夜覽'; });
            }
            updateLabels();
            btns.forEach(btn => btn && btn.addEventListener('click', () => {
                document.body.classList.toggle('night-mode');
                localStorage.setItem(key, document.body.classList.contains('night-mode') ? '1' : '0');
                updateLabels();
            }));
        })();
        (function initToolBar() {
            const keyOpen = 'listening_game_toolbar_open';
            const keyNumbers = 'listening_game_show_numbers';
            const outer = document.getElementById('toolBarOuter');
            const toggleBtn = document.getElementById('toolBarToggle');
            const showNumbersBtn = document.getElementById('showNumbersBtn');
            const showNumbers = localStorage.getItem(keyNumbers) !== '0';
            if (!showNumbers) document.body.classList.add('hide-card-numbers');
            function updateNumberLabel() {
                const on = !document.body.classList.contains('hide-card-numbers');
                if (showNumbersBtn) showNumbersBtn.textContent = on ? '編號 ON' : '編號 OFF';
            }
            updateNumberLabel();
            if (toggleBtn && outer) {
                const isOpen = localStorage.getItem(keyOpen) === '1';
                if (isOpen) { outer.classList.remove('collapsed'); toggleBtn.textContent = '<'; }
                toggleBtn.addEventListener('click', () => {
                    const open = outer.classList.toggle('collapsed');
                    toggleBtn.textContent = open ? '>' : '<';
                    localStorage.setItem(keyOpen, open ? '0' : '1');
                });
            }
            if (showNumbersBtn) showNumbersBtn.addEventListener('click', () => {
                document.body.classList.toggle('hide-card-numbers');
                const on = !document.body.classList.contains('hide-card-numbers');
                localStorage.setItem(keyNumbers, on ? '1' : '0');
                updateNumberLabel();
            });
        })();
        function getQueryParams() {
            const params = {};
            const search = window.location.search.substring(1);
            if (!search) return params;
            for (const part of search.split('&')) {
                const [k, v] = part.split('=');
                params[decodeURIComponent(k)] = decodeURIComponent(v || '');
            }
            return params;
        }

        function escapeHtml(text) {
            const d = document.createElement('div');
            d.textContent = text;
            return d.innerHTML;
        }

        function onlyHan(text) {
            return (text || '').replace(/[^\u4e00-\u9fff\u3400-\u4dbf]/g, '');
        }

        function parseCSV(text) {
            text = (text || '').replace(/^\uFEFF/, '');
            const rows = [];
            const lines = text.replace(/\r\n/g, '\n').replace(/\r/g, '\n').split('\n');
            for (const line of lines) {
                if (!line.trim()) continue;
                const cells = [];
                let cur = '';
                let inQ = false;
                for (let i = 0; i < line.length; i++) {
                    const ch = line[i];
                    if (ch === '\"') {
                        if (inQ && line[i + 1] === '\"') {
                            cur += '\"';
                            i++;
                        } else {
                            inQ = !inQ;
                        }
                    } else if (ch === ',' && !inQ) {
                        cells.push(cur);
                        cur = '';
                    } else {
                        cur += ch;
                    }
                }
                cells.push(cur);
                rows.push(cells);
            }
            return rows;
        }

        // 嘗試減少圖片被直接下載：關閉右鍵選單與拖曳
        document.addEventListener('contextmenu', (e) => {
            if (e.target && e.target.tagName === 'IMG') {
                e.preventDefault();
            }
        });
        document.addEventListener('dragstart', (e) => {
            if (e.target && e.target.tagName === 'IMG') {
                e.preventDefault();
            }
        });

        function pickTTSCVoice() {
            if (!('speechSynthesis' in window)) return null;
            const voices = window.speechSynthesis.getVoices();
            if (!voices || !voices.length) return null;

            const lower = s => (s || '').toLowerCase();

            // 1. 優先 zh-TW，並盡量選到「美佳 / Meijia」
            const zhTwVoices = voices.filter(v => lower(v.lang).startsWith('zh-tw'));
            if (zhTwVoices.length) {
                let preferred = zhTwVoices.find(v => v.name.includes('美佳') || lower(v.name).includes('meijia'));
                if (!preferred) preferred = zhTwVoices[0];
                return preferred;
            }

            // 2. 沒有 zh-TW，就選任一個中文語音（zh-*)
            const zhVoices = voices.filter(v => lower(v.lang).startsWith('zh'));
            if (zhVoices.length) return zhVoices[0];

            // 3. 最後備援：用第一個可用聲音
            return voices[0];
        }

        function playSound(name, shortenWrong) {
            const path = 'sounds/' + name + '.mp3';
            const a = new Audio(path);
            a.volume = 0.8;
            a.play().catch(() => {});
            if (shortenWrong) {
                setTimeout(() => { a.pause(); a.currentTime = 0; }, 450);
            }
        }

        const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);

        function unlockIOSAudio() {
            if (!('speechSynthesis' in window)) return;
            try {
                const u = new SpeechSynthesisUtterance('\u00A0');
                u.lang = 'zh-TW';
                u.volume = 0.01;
                window.speechSynthesis.speak(u);
            } catch (_) {}
        }

        function speakAfterUnlock(text, delayMs) {
            unlockIOSAudio();
            const ms = typeof delayMs === 'number' ? delayMs : 120;
            setTimeout(() => speak(text), ms);
        }

        function speak(text) {
            if (!('speechSynthesis' in window)) return;
            const clean = onlyHan(text) || text;
            if (!clean) return;
            const syn = window.speechSynthesis;
            syn.cancel();
            if (typeof syn.resume === 'function') syn.resume();
            setTimeout(() => {
                if (!('speechSynthesis' in window)) return;
                const utter = new SpeechSynthesisUtterance(clean);
                utter.lang = 'zh-TW';
                const voice = pickTTSCVoice();
                if (voice) utter.voice = voice;
                utter.rate = 0.8;
                utter.onerror = () => {
                    window.speechSynthesis.cancel();
                    setTimeout(() => {
                        try {
                            const u2 = new SpeechSynthesisUtterance(clean);
                            u2.lang = 'zh-TW';
                            const v = pickTTSCVoice();
                            if (v) u2.voice = v;
                            u2.rate = 0.8;
                            window.speechSynthesis.speak(u2);
                        } catch (_) {}
                    }, 200);
                };
                window.speechSynthesis.speak(utter);
            }, 80);
        }

        const params = getQueryParams();
        const DEFAULT_MENU_SHEET = '1264gdkuMnIn2k5L5KM69yumBfJFdYVhxzzsC-2R5Q2U';
        /** 若公開代理皆失敗，可改用 Google Apps Script 代理：部署後取得網址，用 ?proxy=網址 開啟遊戲 */
        const GAS_PROXY_URL = (params.proxy || '').trim().replace(/\/+$/, '');
        const sheetId = params.sheet_id || '';
        const gid = params.gid || '0';
        const lessonParam = params.lesson ? parseInt(params.lesson, 10) : 0;
        const mode = params.mode === 'hard' ? 'hard' : 'easy';
        const staticMode = params.static === '1' || params.static === 'true';
        const staticBookIndex = params.book !== undefined && params.book !== '' ? parseInt(params.book, 10) : -1;
        let currentEasyMode = (mode === 'easy');
        const modeTextEl = document.getElementById('modeText');
        function updateModeLabel() {
            if (modeTextEl) modeTextEl.textContent = currentEasyMode ? '圖片＋注音' : '全注音';
        }
        updateModeLabel();

        const gridEl = document.getElementById('cardGrid');
        const scoreText = document.getElementById('scoreText');
        const progressText = document.getElementById('progressText');
        const messageEl = document.getElementById('message');
        const playBtn = document.getElementById('playBtn');
        const menuView = document.getElementById('menuView');
        const gameView = document.getElementById('gameView');

        let questions = [];
        let questionOrder = [];
        let currentIndex = 0;
        let score = 0;
        let sheetRows = [];
        let numLessons = 1;
        let currentLesson = 1;
        let staticBooks = [];
        let locked = false;
        let isFirstRender = true;

        function setMessage(text, kind) {
            messageEl.textContent = text || '';
            messageEl.className = 'message ' + (kind || '');
        }

        function shuffle(arr) {
            const a = arr.slice();
            for (let i = a.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [a[i], a[j]] = [a[j], a[i]];
            }
            return a;
        }

        function buildQuestionPool(rows, lesson) {
            const items = [];
            let headerRow = -1;
            let questionCol = -1;
            let imageCol = -1;

            // 找出「問題／圖片／語音檔」標題列（第28列為說明，從第29列開始才是題目與圖片）
            for (let i = 0; i < Math.min(rows.length, 35); i++) {
                const row = rows[i];
                if (!row || !row.length) continue;
                const a = (row[0] || '').trim();
                const b = (row[1] || '').trim();
                if (a.includes('題庫')) {
                    headerRow = i + 1;
                    questionCol = 0;
                    imageCol = 1;
                    break;
                }
                // 第28列：A=問題、B=圖片、C=語音檔（此列為說明，不抓取）
                if (a.includes('問題') && b.includes('圖片')) {
                    headerRow = i;
                    questionCol = 0;
                    imageCol = 1;
                    break;
                }
                if (b.includes('題目') && (row[2] || '').trim().includes('圖片')) {
                    headerRow = i;
                    questionCol = 1;
                    imageCol = 2;
                    break;
                }
            }

            const startRow = lesson ? headerRow + 1 + (lesson - 1) * 20 : headerRow + 1;
            const endRow = lesson ? Math.min(headerRow + 1 + lesson * 20, rows.length) : rows.length;

            if (headerRow >= 0 && questionCol >= 0) {
                // 從標題的下一列開始抓（或依 lesson 只抓該課的 20 列）
                for (let i = startRow; i < endRow; i++) {
                    const row = rows[i];
                    if (!row || !row.length) continue;
                    const wordCell = (row[questionCol] || '').trim();
                    if (!wordCell) continue;
                    const img = (row[imageCol] || '').trim();
                    const han = onlyHan(wordCell);
                    items.push({
                        rawText: wordCell,
                        word: han || wordCell,
                        imgUrl: img,
                        qType: ''
                    });
                }
                return items;
            }

            // 退回到：第1列標題，第2欄(B)是題目、第3欄(C)是圖片
            const fbStart = lesson ? 1 + (lesson - 1) * 20 : 1;
            const fbEnd = lesson ? Math.min(1 + lesson * 20, rows.length) : rows.length;
            for (let i = fbStart; i < fbEnd; i++) {
                const row = rows[i];
                if (!row || row.length < 2) continue;
                const raw = (row[1] || '').trim();
                if (!raw) continue;
                const img = (row[2] || '').trim();
                const han = onlyHan(raw);
                items.push({
                    rawText: raw,
                    word: han || raw,
                    imgUrl: img,
                    qType: ''
                });
            }
            return items;
        }

        function extractGidFromUrl(url) {
            if (!url || typeof url !== 'string') return '0';
            const m = url.match(/[?&#]gid=(\d+)/i);
            return m ? m[1] : '0';
        }

        function getSheetBase() {
            return window.location.origin || (window.location.protocol + '//' + window.location.host);
        }

        function useCorsProxy() {
            const protocol = window.location.protocol;
            const h = window.location.hostname;
            if (protocol === 'file:' || !h) return true;
            if (h === 'localhost' || h === '127.0.0.1') return false;
            if (/^192\.168\.\d+\.\d+$/.test(h) || /^10\./.test(h)) return false;
            return true;
        }

        function getSheetCsvUrl(sid, gidVal, proxyIndex) {
            const googleUrl = 'https://docs.google.com/spreadsheets/d/' + encodeURIComponent(sid) + '/export?format=csv&gid=' + encodeURIComponent(gidVal);
            if (!useCorsProxy()) {
                const base = getSheetBase();
                return { url: base + '/api/sheet_csv?sheet_id=' + encodeURIComponent(sid) + '&gid=' + encodeURIComponent(gidVal), raw: true };
            }
            if (GAS_PROXY_URL && proxyIndex === 0) {
                return { url: GAS_PROXY_URL + '?sheet_id=' + encodeURIComponent(sid) + '&gid=' + encodeURIComponent(gidVal), raw: true };
            }
            const proxies = [
                { url: 'https://api.allorigins.win/raw?url=' + encodeURIComponent(googleUrl), raw: true },
                { url: 'https://api.allorigins.win/get?url=' + encodeURIComponent(googleUrl), raw: false },
                { url: 'https://corsproxy.io/?url=' + encodeURIComponent(googleUrl), raw: true }
            ];
            const idx = GAS_PROXY_URL ? proxyIndex - 1 : proxyIndex;
            return proxies[idx >= 0 ? idx : 0] || proxies[0];
        }

        function looksLikeCsv(text) {
            const t = (text || '').trim();
            return t.length > 0 && !t.startsWith('<') && !t.startsWith('{') && !t.startsWith('<!');
        }

        async function fetchCsvFromUrl(url) {
            const resp = await fetch(url);
            if (!resp.ok) throw new Error('HTTP ' + resp.status);
            const text = await resp.text();
            if (!looksLikeCsv(text)) throw new Error('無效的 CSV');
            return parseCSV(text);
        }

        async function fetchSheetCsv(sid, gidVal) {
            const gid = gidVal || '0';
            const url = `https://docs.google.com/spreadsheets/d/${encodeURIComponent(sid)}/export?format=csv&gid=${encodeURIComponent(gid)}`;
            const resp = await fetch(url);
            if (!resp.ok) throw new Error('HTTP ' + resp.status);
            const text = await resp.text();
            if (!looksLikeCsv(text)) throw new Error('試算表未開放檢視');
            return parseCSV(text);
        }

        async function initMenu() {
            document.body.classList.remove('game-page');
            document.body.classList.add('menu-page');
            menuView.classList.remove('hidden');
            if (gameView) gameView.classList.add('hidden');
            const bookSelect = document.getElementById('menuBook');
            const lessonSelect = document.getElementById('menuLesson');
            const startBtn = document.getElementById('menuStart');
            if (!bookSelect || !lessonSelect || !startBtn) return;
            const menuError = document.getElementById('menuError');
            if (menuError) { menuError.style.display = 'none'; menuError.textContent = ''; }
            // 若網址帶有 static=1，則使用 books.json + GitHub CSV；否則預設使用 Google 試算表
            if (staticMode) {
                if (bookSelect) bookSelect.innerHTML = '<option value="">載入中…</option>';
                try {
                    const booksJsonResp = await fetch('books.json');
                    if (booksJsonResp.ok) {
                        const list = await booksJsonResp.json();
                        if (Array.isArray(list) && list.length > 0 && list[0].name && list[0].csv) {
                            staticBooks = list;
                            bookSelect.innerHTML = '<option value="">請選擇課本</option>' + staticBooks.map((b, i) => '<option value="' + i + '">' + escapeHtml(b.name) + '</option>').join('');
                            lessonSelect.innerHTML = '<option value="">請選擇課</option>';
                            bookSelect.addEventListener('change', async () => {
                                const idx = bookSelect.value;
                                lessonSelect.innerHTML = '<option value="">載入中…</option>';
                                if (idx === '' || idx === undefined) {
                                    lessonSelect.innerHTML = '<option value="">請先選課本</option>';
                                    return;
                                }
                                const i = parseInt(idx, 10);
                                if (i < 0 || i >= staticBooks.length) return;
                                const errEl = document.getElementById('menuError');
                                if (errEl) { errEl.style.display = 'none'; errEl.textContent = ''; }
                                try {
                                    const rows = await fetchCsvFromUrl(staticBooks[i].csv);
                                    const dataCount = rows.length - 1;
                                    const n = Math.max(1, Math.ceil(dataCount / 20));
                                    lessonSelect.innerHTML = Array.from({ length: n }, (_, k) => '<option value="' + (k + 1) + '">第 ' + (k + 1) + ' 課</option>').join('');
                                } catch (e) {
                                    lessonSelect.innerHTML = '<option value="">載入失敗</option>';
                                    if (errEl) { errEl.style.display = 'block'; errEl.textContent = '載入失敗：' + e.message; errEl.className = 'message error'; }
                                }
                            });
                            startBtn.addEventListener('click', () => {
                                const idx = bookSelect.value;
                                const lessonVal = lessonSelect.value;
                                if (idx === '' || !lessonVal) return;
                                const modeVal = document.getElementById('menuMode').value;
                                const q = new URLSearchParams({ static: '1', book: idx, lesson: lessonVal, mode: modeVal });
                                const path = window.location.pathname || '';
                                const page = path ? path.split('/').pop() || 'index.html' : 'index.html';
                                window.location.href = page + '?' + q.toString();
                            });
                            return;
                        }
                    }
                } catch (_) {}
            }
            staticBooks = [];
            if (bookSelect) bookSelect.innerHTML = '<option value="">載入中… 若較慢請稍候（約 30–60 秒）</option>';
            if (bookSelect) bookSelect.innerHTML = '<option value="">載入中… 若較慢請稍候（約 30–60 秒）</option>';
            try {
                const rows = await fetchSheetCsv(DEFAULT_MENU_SHEET, '0');
                const books = [];
                for (let i = 1; i < rows.length; i++) {
                    const row = rows[i];
                    const nameD = (row[3] || '').trim();
                    const urlE = (row[4] || '').trim();
                    const name = nameD || (row[2] || '').trim();
                    const url = urlE || (row[3] || '').trim();
                    if (!name) continue;
                    const gidVal = extractGidFromUrl(url) || '0';
                    books.push({ name, gid: gidVal });
                }
                bookSelect.innerHTML = '<option value="">請選擇課本</option>' + books.map(b => '<option value="' + b.gid + '">' + escapeHtml(b.name) + '</option>').join('');
                lessonSelect.innerHTML = '<option value="">請選擇課</option>';

                bookSelect.addEventListener('change', async () => {
                    const gidVal = bookSelect.value;
                    lessonSelect.innerHTML = '<option value="">載入中… 若較慢請稍候</option>';
                    if (!gidVal) {
                        lessonSelect.innerHTML = '<option value="">請先選課本</option>';
                        return;
                    }
                    const errEl = document.getElementById('menuError');
                    if (errEl) { errEl.style.display = 'none'; errEl.textContent = ''; }
                    try {
                        const sheetRows = await fetchSheetCsv(DEFAULT_MENU_SHEET, gidVal);
                        let dataCount = 0;
                        for (let r = 1; r < sheetRows.length; r++) {
                            const row = sheetRows[r];
                            if (row && row.length && (row[0] || '').trim()) dataCount++;
                        }
                        const rowsForLessons = Math.max(dataCount, sheetRows.length - 1);
                        const numLessons = Math.max(1, Math.ceil(rowsForLessons / 20));
                        lessonSelect.innerHTML = Array.from({ length: numLessons }, (_, i) => '<option value="' + (i + 1) + '">第 ' + (i + 1) + ' 課</option>').join('');
                    } catch (e) {
                        lessonSelect.innerHTML = '<option value="">載入失敗</option>';
                        if (errEl) {
                            errEl.style.display = 'block';
                            errEl.textContent = '載入課次失敗：' + e.message + '（請確認試算表已設為「知道連結的任何人可檢視」）';
                            errEl.className = 'message error';
                        }
                    }
                });

                startBtn.addEventListener('click', () => {
                    const gidVal = bookSelect.value;
                    const lessonVal = lessonSelect.value;
                    if (!gidVal || !lessonVal) return;
                    const modeVal = document.getElementById('menuMode').value;
                    const q = new URLSearchParams({
                        sheet_id: DEFAULT_MENU_SHEET,
                        gid: gidVal,
                        lesson: lessonVal,
                        mode: modeVal
                    });
                    const path = window.location.pathname || '';
                    const page = path ? path.split('/').pop() || 'index.html' : 'index.html';
                    window.location.href = page + '?' + q.toString();
                });
            } catch (e) {
                console.error(e);
                const menuError = document.getElementById('menuError');
                if (menuError) {
                    menuError.style.display = 'block';
                    let msg = '無法載入關卡選單：' + e.message;
                    if (useCorsProxy() && !GAS_PROXY_URL) {
                        msg += ' 若始終無法載入可參考 repo 內 GOOGLE_APPS_SCRIPT_PROXY.md 自建代理（選用）。';
                    } else {
                        msg += '（請確認試算表已設為「知道連結的任何人可檢視」）';
                    }
                    msg += ' ';
                    menuError.innerHTML = msg + '<button type="button" class="btn btn-secondary" style="margin-left:8px;padding:6px 14px;" id="menuRetryBtn">再試一次</button>';
                    menuError.className = 'message error';
                    const retryBtn = document.getElementById('menuRetryBtn');
                    if (retryBtn) retryBtn.addEventListener('click', () => { window.location.reload(); });
                }
                if (bookSelect) bookSelect.innerHTML = '<option value="">載入失敗，請重新整理</option>';
                if (lessonSelect) lessonSelect.innerHTML = '<option value="">請先選課本</option>';
            }
        }

        // 每題：亂數選一列為正解（念 A、正確答案為 B），另 5 個選項從其他列各取一對 (A,B)
        // 六個框都顯示 B 欄圖片（或注音）＋底下對應 A 欄的中文字
        function makeQuestion(index) {
            const correct = questions[index];
            const others = questions.filter((_, i) => i !== index);
            const pool = shuffle(others).slice(0, Math.min(5, others.length));
            pool.push(correct);
            const options = shuffle(pool).map(opt => ({
                isCorrect: opt === correct,
                rawText: opt.rawText,
                word: opt.word,
                imgUrl: opt.imgUrl,
                qType: opt.qType
            }));
            return { correct, options };
        }

        function renderQuestion() {
            if (!questions.length) return;
            const realIndex = questionOrder[currentIndex];
            const { correct, options } = makeQuestion(realIndex);
            gridEl.innerHTML = '';
            locked = false;
            progressText.textContent = (currentIndex + 1) + '/' + questions.length;
            setMessage('', '');
            if (isFirstRender) {
                isFirstRender = false;
                document.getElementById('startOverlay').style.display = 'flex';
            } else {
                speak(correct.rawText);
            }

            options.forEach((opt, idx) => {
                const wrap = document.createElement('div');
                wrap.className = 'card-wrap';

                const card = document.createElement('div');
                card.className = 'card';
                card.dataset.correct = opt.isCorrect ? '1' : '0';

                const numSpan = document.createElement('span');
                numSpan.className = 'card-number';
                numSpan.textContent = String(idx + 1);
                numSpan.setAttribute('aria-hidden', 'true');
                card.appendChild(numSpan);

                const main = document.createElement('div');
                main.className = 'card-main';

                const hasImgUrl = opt.imgUrl && String(opt.imgUrl).trim();
                const showImg = currentEasyMode && hasImgUrl && !String(opt.qType || '').includes('全注音');
                if (showImg) {
                    const img = document.createElement('img');
                    img.src = opt.imgUrl;
                    img.loading = 'lazy';
                    img.alt = opt.word;
                    main.appendChild(img);
                } else {
                    const zh = document.createElement('div');
                    zh.className = 'card-zhuyin';
                    zh.innerHTML = escapeHtml(opt.rawText);
                    main.appendChild(zh);
                }

                card.appendChild(main);

                const label = document.createElement('div');
                label.className = 'card-label';
                label.textContent = opt.word;

                wrap.appendChild(card);
                wrap.appendChild(label);

                card.addEventListener('click', () => {
                    if (locked) return;
                    if (opt.isCorrect) {
                        locked = true;
                        card.classList.add('correct');
                        score += 1;
                        scoreText.textContent = '得分：' + score;
                        setMessage('答對了！', 'success');
                        playSound('correct', false);
                        const banner = document.getElementById('successBanner');
                        if (banner) {
                            banner.classList.add('show');
                            setTimeout(() => {
                                banner.classList.remove('show');
                                goToNextQuestion();
                            }, 1000);
                        } else {
                            setTimeout(() => goToNextQuestion(), 1000);
                        }
                    } else {
                        card.classList.add('wrong');
                        setMessage('再試試', 'error');
                        playSound('wrong', true);
                    }
                });

                gridEl.appendChild(wrap);
            });
        }

        function goToNextQuestion() {
            if (!questions.length) return;
            currentIndex = (currentIndex + 1) % questions.length;
            renderQuestion();
        }

        playBtn.addEventListener('click', () => {
            if (!questions.length) return;
            const realIndex = questionOrder[currentIndex];
            const q = questions[realIndex];
            if (q) speakAfterUnlock(q.rawText);
        });

        if (modeTextEl) {
            modeTextEl.addEventListener('click', () => {
                if (!questions.length) return;
                currentEasyMode = !currentEasyMode;
                updateModeLabel();
                renderQuestion();
            });
        }

        function updateLessonUI() {
            const label = document.getElementById('lessonLabel');
            const prevBtn = document.getElementById('lessonPrev');
            const nextBtn = document.getElementById('lessonNext');
            if (label) label.textContent = '第 ' + currentLesson + ' 課';
            if (prevBtn) prevBtn.disabled = currentLesson <= 1;
            if (nextBtn) nextBtn.disabled = currentLesson >= numLessons;
        }

        function applyLesson(lesson) {
            if (!sheetRows.length || lesson < 1 || lesson > numLessons) return;
            currentLesson = lesson;
            questions = buildQuestionPool(sheetRows, currentLesson);
            if (!questions.length) return;
            questionOrder = shuffle(questions.map((_, i) => i));
            currentIndex = 0;
            score = 0;
            scoreText.textContent = '得分：0';
            progressText.textContent = '1/' + questions.length;
            setMessage('', '');
            const overlay = document.getElementById('startOverlay');
            if (overlay) overlay.style.display = 'none';
            updateLessonUI();
            renderQuestion();
            if (window.history && window.history.replaceState) {
                const q = new URLSearchParams(window.location.search);
                q.set('lesson', String(currentLesson));
                if (staticMode && staticBookIndex >= 0) {
                    q.set('static', '1');
                    q.set('book', String(staticBookIndex));
                }
                window.history.replaceState(null, '', (window.location.pathname || 'index.html') + '?' + q.toString());
            }
        }

        function goPrevLesson() {
            if (currentLesson <= 1) return;
            applyLesson(currentLesson - 1);
        }

        function goNextLesson() {
            if (currentLesson >= numLessons) return;
            applyLesson(currentLesson + 1);
        }

        async function init() {
            if (staticMode && staticBookIndex >= 0) {
                document.body.classList.remove('menu-page');
                document.body.classList.add('game-page');
                if (menuView) menuView.classList.add('hidden');
                if (gameView) gameView.classList.remove('hidden');
                setMessage('正在載入題目…', 'info');
                try {
                    const booksResp = await fetch('books.json');
                    if (!booksResp.ok) throw new Error('找不到 books.json');
                    const list = await booksResp.json();
                    if (!Array.isArray(list) || staticBookIndex >= list.length || !list[staticBookIndex].csv) throw new Error('課本設定錯誤');
                    const rows = await fetchCsvFromUrl(list[staticBookIndex].csv);
                    if (!rows.length) { setMessage('CSV 是空的。', 'error'); return; }
                    sheetRows = rows;
                    numLessons = Math.max(1, Math.ceil((rows.length - 1) / 20));
                    currentLesson = lessonParam && lessonParam >= 1 && lessonParam <= numLessons ? lessonParam : 1;
                    questions = buildQuestionPool(rows, currentLesson);
                    if (!questions.length) { setMessage('沒有找到任何題目。', 'error'); return; }
                    questionOrder = shuffle(questions.map((_, i) => i));
                    currentIndex = 0;
                    score = 0;
                    scoreText.textContent = '得分：0';
                    updateLessonUI();
                    renderQuestion();
                    setMessage('載入完成', 'info');
                    document.getElementById('lessonPrev').addEventListener('click', goPrevLesson);
                    document.getElementById('lessonNext').addEventListener('click', goNextLesson);
                    document.getElementById('startOverlay').addEventListener('click', () => {
                        document.getElementById('startOverlay').style.display = 'none';
                        const ri = questionOrder[currentIndex];
                        if (questions[ri]) speakAfterUnlock(questions[ri].rawText);
                    });
                } catch (e) {
                    console.error(e);
                    setMessage('載入題目時發生錯誤：' + (e && e.message ? e.message : e), 'error');
                }
                if ('speechSynthesis' in window) {
                    window.speechSynthesis.onvoiceschanged = () => pickTTSCVoice();
                }
                return;
            }
            if (!sheetId) {
                initMenu();
                return;
            }
            document.body.classList.remove('menu-page');
            document.body.classList.add('game-page');
            if (menuView) menuView.classList.add('hidden');
            if (gameView) gameView.classList.remove('hidden');
            setMessage('正在載入題目… 若較慢請稍候（約 30–60 秒）', 'info');
            try {
                const rows = await fetchSheetCsv(sheetId, gid);
                if (!rows.length) {
                    setMessage('試算表是空的或格式不正確。', 'error');
                    return;
                }
                sheetRows = rows;
                numLessons = Math.max(1, Math.ceil((rows.length - 1) / 20));
                currentLesson = lessonParam && lessonParam >= 1 && lessonParam <= numLessons ? lessonParam : 1;
                questions = buildQuestionPool(rows, currentLesson);
                if (!questions.length) {
                    setMessage('沒有找到任何題目（請確認第2欄「題目」有內容）。', 'error');
                    return;
                }
                questionOrder = shuffle(questions.map((_, i) => i));
                currentIndex = 0;
                score = 0;
                scoreText.textContent = '得分：0';
                updateLessonUI();
                renderQuestion();
                setMessage('載入完成', 'info');
                document.getElementById('lessonPrev').addEventListener('click', goPrevLesson);
                document.getElementById('lessonNext').addEventListener('click', goNextLesson);
                document.getElementById('startOverlay').addEventListener('click', () => {
                    document.getElementById('startOverlay').style.display = 'none';
                    const ri = questionOrder[currentIndex];
                    if (questions[ri]) speakAfterUnlock(questions[ri].rawText);
                });
            } catch (e) {
                console.error(e);
                setMessage('載入題目時發生錯誤：' + (e && e.message ? e.message : e), 'error');
            }

            if ('speechSynthesis' in window) {
                window.speechSynthesis.onvoiceschanged = () => {
                    pickTTSCVoice();
                };
            }
        }

        (function fitViewport() {
            function setHeight() {
                const h = window.visualViewport ? window.visualViewport.height : window.innerHeight;
                document.documentElement.style.setProperty('--viewport-height', h + 'px');
            }
            setHeight();
            if (window.visualViewport) {
                window.visualViewport.addEventListener('resize', setHeight);
                window.visualViewport.addEventListener('scroll', setHeight);
            }
            window.addEventListener('resize', setHeight);
        })();
        init();
    </script>
</body>
</html>
