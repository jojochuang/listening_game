<!doctype html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>聽音辨字</title>
  <script>
    (function () {
      var q = window.location.search || "";
      var p = window.location.pathname || "";
      // 相對連結 listening_game/index.html 在已在 /listening_game/ 底下時會變成 .../listening_game/listening_game/...
      if (/\/listening_game\/listening_game\//.test(p)) {
        window.location.replace(
          window.location.origin +
            p.replace(/\/listening_game\/listening_game\//, "/listening_game/") +
            q
        );
      }
    })();
  </script>
</head>
<body style="font-family:sans-serif;padding:1rem;line-height:1.5;color:#333">
  <p><strong>listening_game</strong> 專案根目錄的 <code>index.html</code> 請放<strong>完整遊戲</strong>（與本機 <code>listening_game.html</code> 相同內容），不要用會轉到 <code>./listening_game/index.html</code> 的暫存頁。</p>
  <p>正確網址範例：<a href="https://jojochuang.github.io/listening_game/index.html">https://jojochuang.github.io/listening_game/index.html</a></p>
</body>
</html>
